# GitHub Actions：构建并部署到 GitHub Pages
# 仓库 Settings → Pages → Source 选 "GitHub Actions"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Unit tests
        run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Resolve Pages build env
        id: pages_env
        run: |
          if [ -n "${{ vars.VITE_SITE_URL }}" ]; then
            echo "site_url=${{ vars.VITE_SITE_URL }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.PAGES_CNAME }}" ]; then
            echo "site_url=https://${{ vars.PAGES_CNAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "site_url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
            echo "::warning::未设置 Variables「VITE_SITE_URL」，已用默认 GitHub Pages 地址；建议在 Settings → Actions → Variables 中填写正式域名。"
          fi
          if [ -n "${{ vars.PAGES_BASE }}" ]; then
            echo "base=${{ vars.PAGES_BASE }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.PAGES_CNAME }}" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
            echo "::notice::已配置 PAGES_CNAME，构建 BASE=/（自定义域从根路径提供站点）。"
          else
            echo "base=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi
          echo "preview_base=http://127.0.0.1:4173/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build:pages
        env:
          PAGES_BASE: ${{ steps.pages_env.outputs.base }}
          VITE_SITE_URL: ${{ steps.pages_env.outputs.site_url }}
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify dist/assets
        run: |
          count=$(find dist/assets -type f 2>/dev/null | wc -l)
          if [ "$count" -lt 2 ]; then
            echo "::error::构建产物不完整（dist/assets 文件过少）。请查看 Build 日志。"
            exit 1
          fi
          echo "dist/assets files: $count"
          for f in hero-home-1280w.jpg hero-home.jpg; do
            if [ ! -f "dist/$f" ]; then
              echo "::error::缺少首页主图 dist/$f（请确认 public/ 已提交且 prebuild resize-hero 成功）"
              exit 1
            fi
          done

      - name: Write CNAME (optional custom domain)
        if: ${{ vars.PAGES_CNAME != '' }}
        run: echo "${{ vars.PAGES_CNAME }}" > dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
