# GitHub Actions：构建并部署到 GitHub Pages
# 仓库 Settings → Pages → Source 选 "GitHub Actions"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Build
        run: npm run build
        env:
          # 绑定自定义域名时，前端资源应从根路径加载
          BASE: /
          # 省事用 github.io 时填你的线上根地址（勿尾斜杠），详情页 canonical/og:url 才正确
          VITE_SITE_URL: https://qysj369.github.io/curqiongyou-shijie-

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
