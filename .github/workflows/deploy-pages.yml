# GitHub Actions：构建并部署到 GitHub Pages
# 仓库 Settings → Pages → Source 选 "GitHub Actions"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Unit tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E (six modules + URL bridges)
        run: npm run test:e2e
        env:
          CI: true

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Resolve Pages build env
        id: pages_env
        run: |
          if [ -z "${{ vars.VITE_SITE_URL }}" ]; then
            echo "::error::请在仓库 Variables 中设置 VITE_SITE_URL，例如 https://qysj369.github.io/curqiongyou-shijie-（无尾斜杠）"
            exit 1
          fi
          if [ -n "${{ vars.PAGES_BASE }}" ]; then
            echo "base=${{ vars.PAGES_BASE }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi
          echo "site_url=${{ vars.VITE_SITE_URL }}" >> "$GITHUB_OUTPUT"
          echo "preview_base=http://127.0.0.1:4173/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build
        env:
          BASE: ${{ steps.pages_env.outputs.base }}
          VITE_SITE_URL: ${{ steps.pages_env.outputs.site_url }}

      - name: Install Playwright Chromium (preview E2E)
        run: npx playwright install --with-deps chromium

      - name: E2E against dist (vite preview)
        run: npx playwright test --config=playwright.preview.config.js
        env:
          CI: true
          PREVIEW_BASE_URL: ${{ steps.pages_env.outputs.preview_base }}

      - name: Write CNAME (optional custom domain)
        if: ${{ vars.PAGES_CNAME != '' }}
        run: echo "${{ vars.PAGES_CNAME }}" > dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
